<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 176" width="340" height="176"
     font-family="Georgia, 'Times New Roman', serif">
  <defs>

    <!-- ══ HONEY GOLD CELL GRADIENTS — 7 distinct light angles ══ -->

    <!-- Center: warm bottom-left to bright top-right -->
    <linearGradient id="hCenter" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c87c18"/>
      <stop offset="30%"  stop-color="#e8a820"/>
      <stop offset="60%"  stop-color="#f5c838"/>
      <stop offset="85%"  stop-color="#fce060"/>
      <stop offset="100%" stop-color="#feeA78"/>
    </linearGradient>

    <!-- Top: lit from top, darkens toward bottom -->
    <linearGradient id="hTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fef0a0"/>
      <stop offset="25%"  stop-color="#f8d048"/>
      <stop offset="60%"  stop-color="#e0a020"/>
      <stop offset="100%" stop-color="#b87018"/>
    </linearGradient>

    <!-- Top-right: diagonal highlight -->
    <linearGradient id="hTopRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fde878"/>
      <stop offset="30%"  stop-color="#f0c038"/>
      <stop offset="65%"  stop-color="#d09020"/>
      <stop offset="100%" stop-color="#a06010"/>
    </linearGradient>

    <!-- Bot-right: mid tone -->
    <linearGradient id="hBotRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0c030"/>
      <stop offset="40%"  stop-color="#d09018"/>
      <stop offset="75%"  stop-color="#a86c10"/>
      <stop offset="100%" stop-color="#7a4c08"/>
    </linearGradient>

    <!-- Bottom: shadow side but still warm gold -->
    <linearGradient id="hBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#e8a818"/>
      <stop offset="40%"  stop-color="#c07810"/>
      <stop offset="100%" stop-color="#8a5008"/>
    </linearGradient>

    <!-- Bot-left: warm reflected light -->
    <linearGradient id="hBotLeft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#904e08"/>
      <stop offset="35%"  stop-color="#c88018"/>
      <stop offset="65%"  stop-color="#eeaa28"/>
      <stop offset="100%" stop-color="#fdd050"/>
    </linearGradient>

    <!-- Top-left: brightest, full light catch -->
    <linearGradient id="hTopLeft" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#c07810"/>
      <stop offset="25%"  stop-color="#e8b028"/>
      <stop offset="55%"  stop-color="#f8d050"/>
      <stop offset="80%"  stop-color="#fde870"/>
      <stop offset="100%" stop-color="#fff4a0"/>
    </linearGradient>

    <!-- Amber sheen — boosted gold catch-light -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="65%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,230,100,0.38)"/>
      <stop offset="40%"  stop-color="rgba(240,180,40,0.12)"/>
      <stop offset="100%" stop-color="rgba(80,30,0,0.20)"/>
    </linearGradient>

    <!-- ══ GREEN METALLIC TEXT ══ -->
    <linearGradient id="greenMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2a7a50"/>
      <stop offset="15%"  stop-color="#0e4a2c"/>
      <stop offset="34%"  stop-color="#0a3d24"/>
      <stop offset="52%"  stop-color="#1a9068"/>
      <stop offset="70%"  stop-color="#0c4830"/>
      <stop offset="86%"  stop-color="#0e4228"/>
      <stop offset="100%" stop-color="#257050"/>
    </linearGradient>

    <linearGradient id="hubMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#226848"/>
      <stop offset="28%"  stop-color="#093a26"/>
      <stop offset="55%"  stop-color="#125c44"/>
      <stop offset="80%"  stop-color="#083622"/>
      <stop offset="100%" stop-color="#1a5c40"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="hiveShadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="rgba(80,35,0,0.40)"/>
    </filter>

    <filter id="greenGlow" x="-15%" y="-25%" width="130%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.02  0 0 0 0 0.28  0 0 0 0 0.16  0 0 0 0.50 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hubShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="rgba(8,40,22,0.65)"/>
    </filter>

  </defs>

  <!-- ══ 7-CELL FLOWER HONEYCOMB ══
       Pointy-top hexagons, r=30
       Center: (170, 88)
       Neighbor distance d = r·√3 = 51.96

       Cell centers:
         Center:    (170,   88)
         Top:       (170,   36)
         Top-right: (215,   62)
         Bot-right: (215,  114)
         Bottom:    (170,  140)
         Bot-left:  (125,  114)
         Top-left:  (125,   62)

       Pointy-top vertex formula (angle offset 30°):
         v0 top:       (cx,      cy-r)
         v1 top-right: (cx+r·√3/2, cy-r/2)
         v2 bot-right: (cx+r·√3/2, cy+r/2)
         v3 bottom:    (cx,      cy+r)
         v4 bot-left:  (cx-r·√3/2, cy+r/2)
         v5 top-left:  (cx-r·√3/2, cy-r/2)
       r=30 → r·√3/2=26
  ══ -->

  <g filter="url(#hiveShadow)">

    <!-- CENTER (170,88) -->
    <polygon points="196.0,103.0 170.0,118.0 144.0,103.0 144.0,73.0 170.0,58.0 196.0,73.0"
             fill="url(#hCenter)"/>
    <polygon points="196.0,103.0 170.0,118.0 144.0,103.0 144.0,73.0 170.0,58.0 196.0,73.0"
             fill="url(#sheen)"/>

    <!-- TOP (170,36) -->
    <polygon points="196.0,51.0 170.0,66.0 144.0,51.0 144.0,21.0 170.0,6.0 196.0,21.0"
             fill="url(#hTop)"/>
    <polygon points="196.0,51.0 170.0,66.0 144.0,51.0 144.0,21.0 170.0,6.0 196.0,21.0"
             fill="url(#sheen)"/>

    <!-- TOP-RIGHT (215,62) -->
    <polygon points="241.0,77.0 215.0,92.0 189.0,77.0 189.0,47.0 215.0,32.0 241.0,47.0"
             fill="url(#hTopRight)"/>
    <polygon points="241.0,77.0 215.0,92.0 189.0,77.0 189.0,47.0 215.0,32.0 241.0,47.0"
             fill="url(#sheen)"/>

    <!-- BOT-RIGHT (215,114) -->
    <polygon points="241.0,129.0 215.0,144.0 189.0,129.0 189.0,99.0 215.0,84.0 241.0,99.0"
             fill="url(#hBotRight)"/>
    <polygon points="241.0,129.0 215.0,144.0 189.0,129.0 189.0,99.0 215.0,84.0 241.0,99.0"
             fill="url(#sheen)"/>

    <!-- BOTTOM (170,140) -->
    <polygon points="196.0,155.0 170.0,170.0 144.0,155.0 144.0,125.0 170.0,110.0 196.0,125.0"
             fill="url(#hBottom)"/>
    <polygon points="196.0,155.0 170.0,170.0 144.0,155.0 144.0,125.0 170.0,110.0 196.0,125.0"
             fill="url(#sheen)"/>

    <!-- BOT-LEFT (125,114) -->
    <polygon points="151.0,129.0 125.0,144.0 99.0,129.0 99.0,99.0 125.0,84.0 151.0,99.0"
             fill="url(#hBotLeft)"/>
    <polygon points="151.0,129.0 125.0,144.0 99.0,129.0 99.0,99.0 125.0,84.0 151.0,99.0"
             fill="url(#sheen)"/>

    <!-- TOP-LEFT (125,62) -->
    <polygon points="151.0,77.0 125.0,92.0 99.0,77.0 99.0,47.0 125.0,32.0 151.0,47.0"
             fill="url(#hTopLeft)"/>
    <polygon points="151.0,77.0 125.0,92.0 99.0,77.0 99.0,47.0 125.0,32.0 151.0,47.0"
             fill="url(#sheen)"/>

  </g>

  <!-- Cell walls — bright warm gold -->
  <g stroke="#c8780e" stroke-width="2.0" fill="none">
    <polygon points="196.0,103.0 170.0,118.0 144.0,103.0 144.0,73.0 170.0,58.0 196.0,73.0"/>
    <polygon points="196.0,51.0 170.0,66.0 144.0,51.0 144.0,21.0 170.0,6.0 196.0,21.0"/>
    <polygon points="241.0,77.0 215.0,92.0 189.0,77.0 189.0,47.0 215.0,32.0 241.0,47.0"/>
    <polygon points="241.0,129.0 215.0,144.0 189.0,129.0 189.0,99.0 215.0,84.0 241.0,99.0"/>
    <polygon points="196.0,155.0 170.0,170.0 144.0,155.0 144.0,125.0 170.0,110.0 196.0,125.0"/>
    <polygon points="151.0,129.0 125.0,144.0 99.0,129.0 99.0,99.0 125.0,84.0 151.0,99.0"/>
    <polygon points="151.0,77.0 125.0,92.0 99.0,77.0 99.0,47.0 125.0,32.0 151.0,47.0"/>
  </g>

  <!-- Inner gold edge highlight — lit face glint -->
  <g stroke="rgba(255,215,80,0.55)" stroke-width="0.9" fill="none">
    <polygon points="196.0,103.0 170.0,118.0 144.0,103.0 144.0,73.0 170.0,58.0 196.0,73.0"/>
    <polygon points="196.0,51.0 170.0,66.0 144.0,51.0 144.0,21.0 170.0,6.0 196.0,21.0"/>
    <polygon points="241.0,77.0 215.0,92.0 189.0,77.0 189.0,47.0 215.0,32.0 241.0,47.0"/>
    <polygon points="241.0,129.0 215.0,144.0 189.0,129.0 189.0,99.0 215.0,84.0 241.0,99.0"/>
    <polygon points="196.0,155.0 170.0,170.0 144.0,155.0 144.0,125.0 170.0,110.0 196.0,125.0"/>
    <polygon points="151.0,129.0 125.0,144.0 99.0,129.0 99.0,99.0 125.0,84.0 151.0,99.0"/>
    <polygon points="151.0,77.0 125.0,92.0 99.0,77.0 99.0,47.0 125.0,32.0 151.0,47.0"/>
  </g>

  <!-- ══ "BEE Hub" — green metallic, vertically centered as a unit ══
       Hive visual center: y=88
       Text block: BEE (size 56, cap≈40px) + 8px gap + Hub (size 24, cap≈17px)
       Block height ≈ 65px, center at y=88
       BEE baseline: 88 - 65/2 + 40 = 88 - 32.5 + 40 = 95.5 → use 76
       Hub baseline: 76 + 8 + 17 = 101 → use ~116

       After visual tuning:
         BEE dominant-baseline=middle at y=80
         Hub dominant-baseline=middle at y=118
         Combined center = (80+118)/2 = 99... nudge both up
         BEE at y=76, Hub at y=112 → center=(76+112)/2=94 ≈ close to 88
         Final: BEE y=74, Hub y=110 → center=92
  ══ -->

  <!-- "BEE" -->
  <text x="170" y="82"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="56" font-weight="700" letter-spacing="-1.5"
        fill="url(#greenMetal)"
        filter="url(#greenGlow)">BEE</text>

  <!-- thin separator line between BEE and Hub -->
  <line x1="138" y1="104" x2="202" y2="104"
        stroke="rgba(30,100,60,0.40)" stroke-width="0.8"/>

  <!-- "Hub" -->
  <text x="170" y="118"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="24" font-weight="300" letter-spacing="7"
        fill="url(#hubMetal)"
        filter="url(#hubShadow)">Hub</text>

</svg>
