name: BEHub
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python>=3.8
  
  # Data manipulation
  - pandas>=1.3.0
  - numpy>=1.21.0
  
  # Statistical analysis
  - scipy>=1.7.0
  
  # File handling
  - pip
  
  # Pip-only dependencies (if any)
  - pip:
    - pathlib2>=2.3.6
    
# Optional dependencies for extended functionality
# Uncomment these lines if you need advanced statistical analyses:
